# Uses AKS App Routing add-on (managed nginx). Enable via:
#   az aks approuting enable --resource-group medicare-rg --name medicare-aks
# rewrite-target sends /api/<segment>/... to backend as /auth/..., /appointments/..., etc.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: healthcare
  annotations:
    nginx.ingress.kubernetes.io/use-regex: 'true'
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: webapprouting.kubernetes.azure.com
  rules:
    - host: healthcare.20.204.188.106.nip.io
      http:
        paths:
          - path: /api/auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  number: 3002
          - path: /api/appointments(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: appointment-service
                port:
                  number: 3003
          - path: /api/ai(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ai-service
                port:
                  number: 3006
          - path: /api/doctor(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: doctor-service
                port:
                  number: 3000
          - path: /api/patient(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: patient-service
                port:
                  number: 3004
          - path: /api/telecom(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: telemedicine-service
                port:
                  number: 3005
          - path: /api/payments(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: payment-service
                port:
                  number: 3007
