apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: medicareacr.azurecr.io/healthcare/ai-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3006
          env:
            - name: PORT
              value: '3006'
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MONGO_URI_AI
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 384Mi
          livenessProbe:
            tcpSocket:
              port: 3006
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 3006
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: healthcare
spec:
  selector:
    app: ai-service
  ports:
    - port: 3006
      targetPort: 3006
  type: ClusterIP
