apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: healthcare
data:
  # MONGO_URI is set per-service in each deployment yaml (database-per-service pattern).
  # The Atlas credentials are in 02-secret.yaml as MONGO_ATLAS_BASE.
  RABBITMQ_URL: amqp://rabbitmq:5672
  DOCTOR_SERVICE_URL: http://doctor-service:3000
  APPOINTMENT_SERVICE_URL: http://appointment-service:3003
