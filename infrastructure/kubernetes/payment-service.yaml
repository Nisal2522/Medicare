# Stripe keys: set STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PUBLISHABLE_KEY in platform-secrets.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: healthcare/payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3007
          env:
            - name: PORT
              value: '3007'
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
          livenessProbe:
            tcpSocket:
              port: 3007
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 3007
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: healthcare
spec:
  selector:
    app: payment-service
  ports:
    - port: 3007
      targetPort: 3007
  type: ClusterIP
