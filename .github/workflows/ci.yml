name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-build:
    name: Build backend services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build each backend service
        run: |
          for service in backend/*/; do
            if [ ! -f "$service/package.json" ]; then continue; fi
            name=$(basename "$service")
            echo "=== $name ==="
            cd "$service"
            npm ci
            npm run build
            cd "$GITHUB_WORKSPACE"
          done

  frontend-verify:
    name: Frontend typecheck + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npx tsc -b

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-verify]
    strategy:
      fail-fast: false
      matrix:
        service:
          - backend/auth-service
          - backend/doctor-service
          - backend/appointment-service
          - backend/patient-service
          - backend/telemedicine-service
          - backend/ai-service
          - backend/payment-service
          - backend/notification-service
          - backend/api-gateway
          - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t healthcare/${{ matrix.service }}:ci ${{ matrix.service }}
